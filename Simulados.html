<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulado Detran | Auto Escola</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #a855f7; 
            --bg: #0f172a; 
            --surface: #1e293b; 
            --text: #f1f5f9;
            --success: #10b981;
            --error: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 800px;
            margin-top: 50px;
            background: var(--surface);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        .question-box h2 { font-size: 1.4rem; margin-bottom: 25px; line-height: 1.5; }
        
        .options-grid { display: grid; gap: 15px; }

        .option-btn {
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            padding: 15px 20px;
            border-radius: 12px;
            color: var(--text);
            text-align: left;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1rem;
        }

        .option-btn:hover { background: rgba(255,255,255,0.1); border-color: var(--primary); }
        .option-btn.correct { background: var(--success) !important; border-color: var(--success); color: white; }
        .option-btn.wrong { background: var(--error) !important; border-color: var(--error); color: white; }

        .score-board { font-weight: bold; color: var(--primary); }

        #result-screen { text-align: center; display: none; }
        .btn-home {
            margin-top: 20px;
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="container" id="quiz-container">
        <div id="quiz-content">
            <div class="header">
                <span id="progress">Questão 1/30</span>
                <span class="score-board">Acertos: <span id="current-score">0</span></span>
            </div>
            
            <div class="question-box">
                <h2 id="question-text">Carregando questão...</h2>
                <div class="options-grid" id="options-container"></div>
            </div>
        </div>

        <div id="result-screen">
            <h1>Simulado Finalizado!</h1>
            <p style="font-size: 1.2rem;">Sua pontuação final foi:</p>
            <div id="final-score" style="font-size: 3rem; font-weight: 800; color: var(--primary); margin: 20px 0;">0/30</div>
            <p id="feedback-text"></p>
            <button class="btn-home" onclick="window.location.href='Aulas.html'">Voltar para Início</button>
        </div>
    </div>

    <script src="script.js"></script>

    <script>
        // VERIFICAÇÃO DE SEGURANÇA AO ENTRAR
        window.onload = function() {
            if (!podeFazerSimulado()) {
                alert("🔒 Você já realizou um simulado hoje. O sistema libera um novo teste por dia para garantir seu aprendizado.");
                window.location.href = 'Aulas.html';
                return;
            }
            loadQuestions();
        };

        let questions = [];
        let currentIdx = 0;
        let score = 0;

        async function loadQuestions() {
            // Simulação de carregamento (Substitua pela sua lógica de busca se necessário)
            questions = [
                { q: "Qual a velocidade máxima em via local onde não houver sinalização?", a: "30 km/h", b: "40 km/h", c: "60 km/h", d: "80 km/h", correta: "a" },
                { q: "A placa R-1 indica:", a: "Siga em frente", b: "Parada Obrigatória", c: "Dê a preferência", d: "Proibido estacionar", correta: "b" }
            ];
            showQuestion();
        }

        function showQuestion() {
            if (currentIdx >= questions.length) {
                finish();
                return;
            }

            const q = questions[currentIdx];
            document.getElementById('progress').innerText = `Questão ${currentIdx + 1}/${questions.length}`;
            document.getElementById('question-text').innerText = q.q;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';

            ['a', 'b', 'c', 'd'].forEach(letter => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = q[letter];
                btn.onclick = () => checkAnswer(letter, q.correta, btn);
                container.appendChild(btn);
            });
        }

        function checkAnswer(selected, correct, btn) {
            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(b => b.style.pointerEvents = 'none');

            if (selected.toLowerCase() === correct.toLowerCase()) {
                btn.classList.add('correct');
                score++;
                document.getElementById('current-score').innerText = score;
            } else {
                btn.classList.add('wrong');
                // Mostra a correta para o aluno aprender
                allBtns.forEach(b => {
                    if(b.innerText === questions[currentIdx][correct]) b.classList.add('correct');
                });
            }

            setTimeout(() => {
                currentIdx++;
                showQuestion();
            }, 1500);
        }

        function finish() {
            // REGISTRA QUE O ALUNO TERMINOU HOJE
            registrarConclusaoSimulado();

            document.getElementById('quiz-content').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            document.getElementById('final-score').innerText = `${score}/${questions.length}`;
            
            const percent = (score / questions.length) * 100;
            document.getElementById('feedback-text').innerText = percent >= 70 
                ? "Parabéns! Você atingiu a média para aprovação!" 
                : "Continue estudando. Você precisa de no mínimo 70% de acertos.";
        }
    </script>
</body>
</html>
