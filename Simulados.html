<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulado Detran | Auto Escola</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #a855f7; --bg: #0f172a; --surface: #1e293b; --text: #f1f5f9;
            --success: #10b981; --error: #ef4444;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 90%; max-width: 800px; margin-top: 50px; background: var(--surface); padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .options-grid { display: grid; gap: 15px; }
        .option-btn { background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1); padding: 15px 20px; border-radius: 12px; color: var(--text); text-align: left; cursor: pointer; transition: 0.3s; width: 100%; }
        .option-btn:hover { border-color: var(--primary); }
        .option-btn.correct { background: var(--success) !important; color: white; }
        .option-btn.wrong { background: var(--error) !important; color: white; }
        #result-screen { text-align: center; display: none; }
        .btn-home { margin-top: 20px; background: var(--primary); color: white; border: none; padding: 12px 30px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        #loading { text-align: center; padding: 50px; }
    </style>
</head>
<body>

    <div class="container" id="quiz-container">
        <div id="loading">Carregando questões do banco de dados...</div>

        <div id="quiz-content" style="display:none;">
            <div class="header">
                <span id="progress">Questão 1/30</span>
                <span style="color:var(--primary); font-weight:bold;">Acertos: <span id="current-score">0</span></span>
            </div>
            <div class="question-box">
                <h2 id="question-text"></h2>
                <div class="options-grid" id="options-container"></div>
            </div>
        </div>

        <div id="result-screen">
            <h1>Simulado Finalizado!</h1>
            <div id="final-score" style="font-size: 3rem; font-weight: 800; color: var(--primary); margin: 20px 0;">0/30</div>
            <p id="feedback-text"></p>
            <button class="btn-home" onclick="window.location.href='Aulas.html'">Voltar para Início</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        let questions = [];
        let currentIdx = 0;
        let score = 0;

        window.onload = function() {
            // Trava de segurança: Se já fez hoje, bloqueia
            if (!podeFazerSimulado()) {
                alert("🔒 Você já realizou um simulado hoje. Tente novamente amanhã!");
                window.location.href = 'Aulas.html';
                return;
            }
            loadQuestions();
        };

        // PUXANDO AS QUESTÕES DA SUA PLANILHA (SHEETDB_API_URL configurada no script.js)
        async function loadQuestions() {
            try {
                const response = await fetch(`${SHEETDB_API_URL}?action=get_questions`);
                const data = await response.json();
                
                // Embaralha as questões e pega 30 (opcional)
                questions = data.sort(() => 0.5 - Math.random()).slice(0, 30);
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('quiz-content').style.display = 'block';
                showQuestion();
            } catch (error) {
                console.error("Erro ao carregar questões:", error);
                document.getElementById('loading').innerText = "Erro ao carregar questões. Tente novamente.";
            }
        }

        function showQuestion() {
            if (currentIdx >= questions.length) {
                finish();
                return;
            }

            const q = questions[currentIdx];
            document.getElementById('progress').innerText = `Questão ${currentIdx + 1}/${questions.length}`;
            document.getElementById('question-text').innerText = q.pergunta || q.q; // Ajuste conforme o nome da coluna no seu Sheets
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';

            // Mapeia as opções (ajuste as letras conforme suas colunas: a, b, c, d)
            ['a', 'b', 'c', 'd'].forEach(letter => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = q[letter];
                btn.onclick = () => checkAnswer(letter, q.correta || q.resposta, btn);
                container.appendChild(btn);
            });
        }

        function checkAnswer(selected, correct, btn) {
            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(b => b.style.pointerEvents = 'none');

            if (selected.toLowerCase() === correct.toLowerCase()) {
                btn.classList.add('correct');
                score++;
                document.getElementById('current-score').innerText = score;
            } else {
                btn.classList.add('wrong');
                // Mostra a correta
                allBtns.forEach(b => {
                    const letraBotao = b.innerText;
                    if(letraBotao === questions[currentIdx][correct.toLowerCase()]) b.classList.add('correct');
                });
            }

            setTimeout(() => {
                currentIdx++;
                showQuestion();
            }, 1500);
        }

        function finish() {
            // Salva a trava de "somente um por dia"
            registrarConclusaoSimulado();

            document.getElementById('quiz-content').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            document.getElementById('final-score').innerText = `${score}/${questions.length}`;
            
            const percent = (score / questions.length) * 100;
            document.getElementById('feedback-text').innerText = percent >= 70 
                ? "Parabéns! Você atingiu a média necessária!" 
                : "Continue estudando. Você precisa de no mínimo 70% de acertos.";
        }
    </script>
</body>
</html>
